name: starry_note
description: A local, cross-platform writing and administration studio for Starry Blog.
publish_to: none
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  file_picker: 12.0.0-beta.7
  flutter_markdown: ^0.7.7+1
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  mime: ^2.0.0
  pasteboard: ^0.5.0
  path: ^1.9.1
  path_provider: ^2.1.6
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  flutter_secure_storage_windows: 4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
